<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-SZVHCD3NRF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-SZVHCD3NRF');
    </script>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">
    <title>Redirecting to Amazon — Built with Claude in 28 Days</title>
    <meta name="description" content="Redirecting you to your local Amazon store to purchase Built with Claude in 28 Days by Rodrigo Madriz.">
    <meta name="robots" content="noindex, nofollow">
    <link rel="canonical" href="https://builtwithclaudebook.com/amazon-redirect.html">
    <style>
        body {
            background: #0F1419;
            color: #8B98A5;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .msg {
            text-align: center;
            font-size: 1rem;
        }
        .msg a {
            color: #00ACED;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="msg" id="msg">Redirecting to Amazon...</div>
    <script>
    (function () {
        var ASIN = 'B0GVPXGS5Q';

        var tz;
        try {
            tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
        } catch (e) {
            tz = '';
        }

        var canadianZones = [
            'America/Toronto', 'America/Montreal', 'America/Vancouver',
            'America/Edmonton', 'America/Winnipeg', 'America/Halifax',
            'America/St_Johns', 'America/Regina', 'America/Whitehorse',
            'America/Yellowknife', 'America/Iqaluit', 'America/Moncton',
            'America/Thunder_Bay', 'America/Nipigon', 'America/Rainy_River',
            'America/Rankin_Inlet', 'America/Resolute', 'America/Swift_Current',
            'America/Dawson', 'America/Dawson_Creek', 'America/Fort_Nelson',
            'America/Creston', 'America/Glace_Bay', 'America/Goose_Bay',
            'America/Pangnirtung', 'America/Cambridge_Bay', 'America/Inuvik',
            'America/Atikokan', 'America/Blanc-Sablon'
        ];

        var usZones = [
            'America/New_York', 'America/Chicago', 'America/Denver',
            'America/Los_Angeles', 'America/Phoenix', 'America/Anchorage',
            'America/Adak', 'America/Boise', 'America/Detroit',
            'America/Indiana', 'America/Kentucky', 'America/Menominee',
            'America/Nome', 'America/North_Dakota', 'America/Juneau',
            'America/Sitka', 'America/Yakutat', 'America/Metlakatla',
            'Pacific/Honolulu'
        ];

        var domain = 'www.amazon.com';
        var suffix = '';

        // Check Canada first (affiliate tag only applies here)
        var isCanada = false;
        for (var i = 0; i < canadianZones.length; i++) {
            if (tz === canadianZones[i]) {
                isCanada = true;
                break;
            }
        }

        if (isCanada) {
            domain = 'www.amazon.ca';
            suffix = '?tag=basketbrain-20';
        } else {
            // Check US (partial match for America/Indiana/*, America/Kentucky/*, etc.)
            var isUS = false;
            for (var j = 0; j < usZones.length; j++) {
                if (tz === usZones[j] || tz.indexOf(usZones[j] + '/') === 0) {
                    isUS = true;
                    break;
                }
            }

            if (isUS) {
                domain = 'www.amazon.com';
            } else if (tz === 'Europe/London' || tz === 'Europe/Belfast') {
                domain = 'www.amazon.co.uk';
            } else if (tz.indexOf('Europe/') === 0) {
                domain = 'www.amazon.de';
            } else if (tz === 'Asia/Tokyo') {
                domain = 'www.amazon.co.jp';
            } else if (tz === 'Asia/Kolkata' || tz === 'Asia/Calcutta') {
                domain = 'www.amazon.in';
            } else if (tz.indexOf('Australia/') === 0) {
                domain = 'www.amazon.com.au';
            }
            // Default: amazon.com (already set)
        }

        var url = 'https://' + domain + '/dp/' + ASIN + suffix;

        document.getElementById('msg').innerHTML =
            'Redirecting to Amazon... <br><a href="' + url + '">Click here if not redirected</a>';

        window.location.replace(url);
    })();
    </script>
</body>
</html>
